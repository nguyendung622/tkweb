<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 594" font-family="'Be Vietnam Pro', Arial, sans-serif">

  <!-- Nền poster A3 đứng (tỉ lệ 1:√2) -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#f4a261"/>
    </linearGradient>
  </defs>

  <!-- Nền -->
  <rect width="420" height="594" fill="url(#bgGrad)" rx="4"/>

  <!-- Họa tiết hình tròn trang trí (phía trên phải) -->
  <circle cx="360" cy="80"  r="130" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="40"/>
  <circle cx="360" cy="80"  r="90"  fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="25"/>
  <circle cx="360" cy="80"  r="50"  fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="14"/>

  <!-- Họa tiết góc dưới trái -->
  <circle cx="0"   cy="594" r="100" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="30"/>
  <circle cx="0"   cy="594" r="60"  fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="18"/>

  <!-- Thanh accent gradient trên cùng -->
  <rect x="0" y="0" width="420" height="6" fill="url(#accentGrad)" rx="4"/>

  <!-- ── HEADER: Tên đơn vị ── -->
  <text x="30" y="42" font-size="11" fill="rgba(255,255,255,0.5)" letter-spacing="3" font-weight="600">HỌC VIỆN BÁO CHÍ VÀ TUYÊN TRUYỀN</text>
  <line x1="30" y1="50" x2="390" y2="50" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- ── LABEL SỰ KIỆN ── -->
  <rect x="30" y="64" width="110" height="20" fill="url(#accentGrad)" rx="3"/>
  <text x="85" y="78" font-size="9" fill="white" text-anchor="middle" font-weight="700" letter-spacing="1">HỘI THẢO QUỐC GIA</text>

  <!-- ── TIÊU ĐỀ CHÍNH ── -->
  <text x="30" y="122" font-size="36" fill="white" font-weight="900" letter-spacing="-0.5">BÁO CHÍ SỐ</text>
  <text x="30" y="162" font-size="36" fill="white" font-weight="900" letter-spacing="-0.5">VIỆT NAM</text>
  <text x="30" y="202" font-size="42" fill="url(#accentGrad)" font-weight="900" letter-spacing="-1">2025</text>

  <!-- ── PHỤ ĐỀ ── -->
  <line x1="30" y1="218" x2="200" y2="218" stroke="url(#accentGrad)" stroke-width="2"/>
  <text x="30" y="238" font-size="14" fill="rgba(255,255,255,0.85)" font-style="italic">Truyền thông trong kỷ nguyên AI</text>

  <!-- ── ẢNH MINH HỌA (placeholder hình ảnh AI/báo chí) ── -->
  <rect x="30" y="258" width="360" height="170" fill="rgba(255,255,255,0.05)" rx="6" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Biểu tượng gợi ý báo chí + AI -->
  <circle cx="210" cy="343" r="55" fill="rgba(255,255,255,0.06)"/>
  <circle cx="210" cy="343" r="38" fill="rgba(255,255,255,0.08)"/>
  <!-- Biểu tượng báo -->
  <rect x="186" y="322" width="48" height="36" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2" rx="3"/>
  <line x1="192" y1="332" x2="228" y2="332" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <line x1="192" y1="340" x2="228" y2="340" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="192" y1="348" x2="215" y2="348" stroke="rgba(255,255,255,0.2)"  stroke-width="1"/>
  <!-- Biểu tượng AI chip -->
  <rect x="156" y="330" width="24" height="24" fill="none" stroke="rgba(230,57,70,0.6)" stroke-width="1.5" rx="4"/>
  <rect x="161" y="335" width="14" height="14" fill="rgba(230,57,70,0.25)" rx="2"/>
  <line x1="152" y1="336" x2="156" y2="336" stroke="rgba(230,57,70,0.5)" stroke-width="1"/>
  <line x1="152" y1="342" x2="156" y2="342" stroke="rgba(230,57,70,0.5)" stroke-width="1"/>
  <line x1="180" y1="336" x2="184" y2="336" stroke="rgba(230,57,70,0.5)" stroke-width="1"/>
  <line x1="180" y1="342" x2="184" y2="342" stroke="rgba(230,57,70,0.5)" stroke-width="1"/>
  <text x="210" y="395" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">[ Hình ảnh minh họa ]</text>

  <!-- ── THÔNG TIN SỰ KIỆN ── -->
  <rect x="30" y="442" width="360" height="1" fill="rgba(255,255,255,0.12)"/>

  <!-- Icon + Ngày giờ -->
  <rect x="30" y="454" width="3" height="36" fill="url(#accentGrad)" rx="2"/>
  <text x="42" y="469" font-size="11" fill="rgba(255,255,255,0.6)" font-weight="600">THỜI GIAN</text>
  <text x="42" y="485" font-size="13" fill="white" font-weight="700">8:00 – 17:00 | Thứ Bảy, 15/11/2025</text>

  <!-- Icon + Địa điểm -->
  <rect x="30" y="498" width="3" height="36" fill="url(#accentGrad)" rx="2"/>
  <text x="42" y="513" font-size="11" fill="rgba(255,255,255,0.6)" font-weight="600">ĐỊA ĐIỂM</text>
  <text x="42" y="529" font-size="12" fill="white" font-weight="700">Hội trường A — Hà Nội</text>

  <!-- ── FOOTER ── -->
  <rect x="0" y="554" width="420" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="30"  y="578" font-size="10" fill="rgba(255,255,255,0.5)">Đăng ký: baochiso2025.vn</text>
  <text x="390" y="578" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="end">#BaochíSo2025</text>

  <!-- Thanh accent dưới cùng -->
  <rect x="0" y="590" width="420" height="4" fill="url(#accentGrad)"/>

  <!-- Nhãn chú thích ngoài poster (không in) -->
  <text x="210" y="592" font-size="0" fill="transparent">poster-a3-297x420mm</text>

</svg>
