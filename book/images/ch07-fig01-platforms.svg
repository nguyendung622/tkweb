<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 264" font-family="'Be Vietnam Pro', Arial, sans-serif">

  <!-- ① NỀN -->
  <rect width="720" height="264" fill="#f8f9fa" rx="6"/>
  <!-- Vùng chart -->
  <rect x="8" y="44" width="704" height="210" fill="white" rx="5" stroke="#e8eaed" stroke-width="1"/>

  <!-- ② NỘI DUNG -->
  <text x="360" y="22" font-size="13" fill="#1a1a2e" text-anchor="middle" font-weight="700">Số người dùng mạng xã hội tại Việt Nam (2024, triệu người)</text>
  <text x="360" y="36" font-size="9" fill="#888" text-anchor="middle">Nguồn: We Are Social &amp; Meltwater 2024 · Kích thước hiển thị theo tỷ lệ</text>

  <!-- Đường kẻ dọc tham chiếu (mờ) -->
  <line x1="278" y1="48" x2="278" y2="250" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="408" y1="48" x2="408" y2="250" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="538" y1="48" x2="538" y2="250" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="668" y1="48" x2="668" y2="250" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Nhãn trục X -->
  <text x="148" y="256" font-size="8" fill="#bbb" text-anchor="middle">0</text>
  <text x="278" y="256" font-size="8" fill="#bbb" text-anchor="middle">20</text>
  <text x="408" y="256" font-size="8" fill="#bbb" text-anchor="middle">40</text>
  <text x="538" y="256" font-size="8" fill="#bbb" text-anchor="middle">60</text>
  <text x="668" y="256" font-size="8" fill="#bbb" text-anchor="middle">80</text>

  <!-- Trục Y dọc (start of bars) -->
  <line x1="148" y1="48" x2="148" y2="250" stroke="#ddd" stroke-width="1"/>

  <!-- ===== Hàng 1: Zalo 75 triệu ===== -->
  <!-- Bar: scale = 540/80 = 6.75px per million · 75M → 506px, bar from x=148 to x=654 -->
  <rect x="148" y="58" width="506" height="28" fill="#0b84ff" rx="3"/>
  <!-- Nhãn bên trong -->
  <text x="148" y="74" font-size="9" fill="white" font-weight="700" dx="8">~75 triệu</text>
  <text x="648" y="74" font-size="9" fill="white" font-weight="700" text-anchor="end">Mọi lứa tuổi</text>

  <!-- ===== Hàng 2: Facebook 72 triệu ===== -->
  <!-- 72M → 486px -->
  <rect x="148" y="100" width="486" height="28" fill="#1877f2" rx="3"/>
  <text x="148" y="116" font-size="9" fill="white" font-weight="700" dx="8">~72 triệu</text>
  <text x="628" y="116" font-size="9" fill="white" font-weight="700" text-anchor="end">25–44 tuổi</text>

  <!-- ===== Hàng 3: YouTube 63 triệu ===== -->
  <!-- 63M → 425px -->
  <rect x="148" y="142" width="425" height="28" fill="#e53935" rx="3"/>
  <text x="148" y="158" font-size="9" fill="white" font-weight="700" dx="8">~63 triệu</text>
  <text x="567" y="158" font-size="9" fill="white" font-weight="700" text-anchor="end">18–34 tuổi</text>

  <!-- ===== Hàng 4: TikTok 50 triệu ===== -->
  <!-- 50M → 338px -->
  <rect x="148" y="184" width="338" height="28" fill="#424242" rx="3"/>
  <text x="148" y="200" font-size="9" fill="white" font-weight="700" dx="8">~50 triệu</text>
  <text x="480" y="200" font-size="9" fill="white" font-weight="700" text-anchor="end">16–30 tuổi</text>

  <!-- ===== Hàng 5: Instagram 12 triệu ===== -->
  <!-- 12M → 81px -->
  <rect x="148" y="226" width="81" height="28" fill="#c2185b" rx="3"/>
  <!-- Nhãn ngoài bar (bar quá hẹp) -->
  <text x="237" y="242" font-size="9" fill="#c2185b" font-weight="700" dx="6">~12 triệu · 18–35 tuổi</text>

  <!-- Nhãn nền tảng bên trái -->
  <!-- Zalo -->
  <circle cx="20" cy="72" r="13" fill="#0b84ff"/>
  <text x="20" y="76.5" font-size="9.5" fill="white" text-anchor="middle" font-weight="700">Z</text>
  <text x="38" y="76" font-size="11" fill="#333" font-weight="600">Zalo</text>
  <!-- Facebook -->
  <circle cx="20" cy="114" r="13" fill="#1877f2"/>
  <text x="20" y="118.5" font-size="9.5" fill="white" text-anchor="middle" font-weight="700">f</text>
  <text x="38" y="118" font-size="11" fill="#333" font-weight="600">Facebook</text>
  <!-- YouTube -->
  <circle cx="20" cy="156" r="13" fill="#e53935"/>
  <text x="20" y="160.5" font-size="8.5" fill="white" text-anchor="middle" font-weight="700">▶</text>
  <text x="38" y="160" font-size="11" fill="#333" font-weight="600">YouTube</text>
  <!-- TikTok -->
  <circle cx="20" cy="198" r="13" fill="#424242"/>
  <text x="20" y="202.5" font-size="9" fill="white" text-anchor="middle" font-weight="700">TT</text>
  <text x="38" y="202" font-size="11" fill="#333" font-weight="600">TikTok</text>
  <!-- Instagram -->
  <circle cx="20" cy="240" r="13" fill="#c2185b"/>
  <text x="20" y="244.5" font-size="8.5" fill="white" text-anchor="middle" font-weight="700">IN</text>
  <text x="38" y="244" font-size="11" fill="#333" font-weight="600">Instagram</text>

</svg>
