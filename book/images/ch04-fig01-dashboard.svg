  <text x="390" y="196" font-size="11" fill="#646970">tran.editor</text>
  <text x="470" y="196" font-size="11" fill="#646970">Kinh tế</text>
  <text x="590" y="196" font-size="11" fill="#646970">27/03/2026</text>

