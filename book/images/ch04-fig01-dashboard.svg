  <text x="190" y="346" font-size="12" font-weight="bold" fill="#1d2327">Chú thích:</text>
  <circle cx="200" cy="362" r="9" fill="#2271b1"/>
  <text x="200" y="366" font-size="10" fill="white" text-anchor="middle">①</text>
  <text x="215" y="366" font-size="11" fill="#1d2327">Sidebar Menu — thanh điều hướng chính của WordPress Admin</text>
  <circle cx="200" cy="382" r="9" fill="#2271b1"/>
  <text x="200" y="386" font-size="10" fill="white" text-anchor="middle">②</text>
  <text x="215" y="386" font-size="11" fill="#1d2327">Thanh filter — lọc bài viết theo trạng thái (Đã đăng / Nháp / Thùng rác)</text>
  <circle cx="200" cy="402" r="9" fill="#2271b1"/>
  <text x="200" y="406" font-size="10" fill="white" text-anchor="middle">③</text>
  <text x="215" y="406" font-size="11" fill="#1d2327">Danh sách bài viết — hiển thị tác giả, chuyên mục và ngày đăng</text>
