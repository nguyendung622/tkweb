  <text x="390" y="298" font-size="11" fill="#646970">hoang.pv</text>
  <text x="470" y="298" font-size="11" fill="#646970">Y tế</text>
  <text x="590" y="298" font-size="11" fill="#646970">24/03/2026</text>

