  <text x="390" y="264" font-size="11" fill="#646970">pham.writer</text>
  <text x="470" y="264" font-size="11" fill="#646970">Du lịch</text>
  <text x="590" y="264" font-size="11" fill="#646970">25/03/2026</text>

