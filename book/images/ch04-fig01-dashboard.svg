  <text x="390" y="230" font-size="11" fill="#646970">le.reporter</text>
  <text x="470" y="230" font-size="11" fill="#646970">Chính trị</text>
  <text x="590" y="230" font-size="11" fill="#646970">26/03/2026</text>

