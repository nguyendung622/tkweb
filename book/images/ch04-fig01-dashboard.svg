  <rect x="170" y="242" width="530" height="34" fill="#f6f7f7" rx="2"/>
  <rect x="170" y="242" width="530" height="34" fill="none" stroke="#c3c4c7" stroke-width="0.5"/>
  <rect x="186" y="253" width="12" height="12" rx="2" fill="none" stroke="#8c8f94" stroke-width="1.5"/>
