<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 256" font-family="'Be Vietnam Pro', Arial, sans-serif">

  <!-- NỀN -->
  <rect width="720" height="256" fill="#f5f6f8" rx="6"/>

  <!-- Tiêu đề -->
  <text x="360" y="16" font-size="13" fill="#1a1a2e" text-anchor="middle" font-weight="700">Vòng lặp dữ liệu — Phân tích → Insight → Hành động</text>

  <!-- ══════════════════════════════════════
       BOX 1: PHÂN TÍCH (blue)
  ══════════════════════════════════════ -->
  <rect x="8" y="26" width="210" height="190" fill="white" rx="5" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="8" y="26" width="210" height="36" fill="#1565c0" rx="5"/>
  <rect x="8" y="50" width="210" height="12" fill="#1565c0"/>
  <text x="113" y="41" font-size="11" fill="white" text-anchor="middle" font-weight="700">① Phân tích</text>
  <text x="113" y="55" font-size="7.5" fill="#bbdefb" text-anchor="middle">Thu thập dữ liệu hàng tuần</text>

  <circle cx="20" cy="80" r="3" fill="#1565c0"/>
  <text x="28" y="84" font-size="8" fill="#333">GA4: Users, Acquisition</text>
  <circle cx="20" cy="100" r="3" fill="#1565c0"/>
  <text x="28" y="104" font-size="8" fill="#333">GA4: Engagement, Scroll</text>
  <circle cx="20" cy="120" r="3" fill="#1565c0"/>
  <text x="28" y="124" font-size="8" fill="#333">Search Console: Queries</text>
  <circle cx="20" cy="140" r="3" fill="#1565c0"/>
  <text x="28" y="144" font-size="8" fill="#333">Hotjar: Heatmap, Scroll map</text>
  <circle cx="20" cy="160" r="3" fill="#1565c0"/>
  <text x="28" y="164" font-size="8" fill="#333">So sánh tuần trước vs tuần này</text>
  <circle cx="20" cy="180" r="3" fill="#1565c0"/>
  <text x="28" y="184" font-size="8" fill="#555" font-style="italic">Thứ Hai hàng tuần · 30 phút</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="121" x2="244" y2="121" stroke="#999" stroke-width="2"/>
  <polygon points="244,116 254,121 244,126" fill="#999"/>

  <!-- ══════════════════════════════════════
       BOX 2: INSIGHT (purple)
  ══════════════════════════════════════ -->
  <rect x="256" y="26" width="208" height="190" fill="white" rx="5" stroke="#7b1fa2" stroke-width="1.5"/>
  <rect x="256" y="26" width="208" height="36" fill="#7b1fa2" rx="5"/>
  <rect x="256" y="50" width="208" height="12" fill="#7b1fa2"/>
  <text x="360" y="41" font-size="11" fill="white" text-anchor="middle" font-weight="700">② Insight</text>
  <text x="360" y="55" font-size="7.5" fill="#e1bee7" text-anchor="middle">Diễn giải ý nghĩa đằng sau số liệu</text>

  <circle cx="268" cy="80" r="3" fill="#7b1fa2"/>
  <text x="276" y="84" font-size="8" fill="#333">Hỏi "Tại sao?" với mọi con số</text>
  <circle cx="268" cy="100" r="3" fill="#7b1fa2"/>
  <text x="276" y="104" font-size="8" fill="#333">Bài tốt: chủ đề/định dạng gì?</text>
  <circle cx="268" cy="120" r="3" fill="#7b1fa2"/>
  <text x="276" y="124" font-size="8" fill="#333">Kênh nào hiệu quả nhất?</text>
  <circle cx="268" cy="140" r="3" fill="#7b1fa2"/>
  <text x="276" y="144" font-size="8" fill="#333">Xu hướng tăng/giảm tuần này?</text>
  <circle cx="268" cy="160" r="3" fill="#7b1fa2"/>
  <text x="276" y="164" font-size="8" fill="#333">Tìm pattern, không chỉ số lẻ</text>
  <circle cx="268" cy="180" r="3" fill="#7b1fa2"/>
  <text x="276" y="184" font-size="8" fill="#555" font-style="italic">Ghi 3 insight chính vào notes</text>

  <!-- Arrow 2→3 -->
  <line x1="466" y1="121" x2="490" y2="121" stroke="#999" stroke-width="2"/>
  <polygon points="490,116 500,121 490,126" fill="#999"/>

  <!-- ══════════════════════════════════════
       BOX 3: HÀNH ĐỘNG (green)
  ══════════════════════════════════════ -->
  <rect x="504" y="26" width="208" height="190" fill="white" rx="5" stroke="#2e7d32" stroke-width="1.5"/>
  <rect x="504" y="26" width="208" height="36" fill="#2e7d32" rx="5"/>
  <rect x="504" y="50" width="208" height="12" fill="#2e7d32"/>
  <text x="608" y="41" font-size="11" fill="white" text-anchor="middle" font-weight="700">③ Hành động</text>
  <text x="608" y="55" font-size="7.5" fill="#c8e6c9" text-anchor="middle">Quyết định cụ thể cho tuần tới</text>

  <circle cx="516" cy="80" r="3" fill="#2e7d32"/>
  <text x="524" y="84" font-size="8" fill="#333">Quyết định chủ đề tuần tới</text>
  <circle cx="516" cy="100" r="3" fill="#2e7d32"/>
  <text x="524" y="104" font-size="8" fill="#333">Tối ưu Title + Meta description</text>
  <circle cx="516" cy="120" r="3" fill="#2e7d32"/>
  <text x="524" y="124" font-size="8" fill="#333">Điều chỉnh lịch đăng bài</text>
  <circle cx="516" cy="140" r="3" fill="#2e7d32"/>
  <text x="524" y="144" font-size="8" fill="#333">Cập nhật bài cũ đang tụt hạng</text>
  <circle cx="516" cy="160" r="3" fill="#2e7d32"/>
  <text x="524" y="164" font-size="8" fill="#333">Thử A/B test tiêu đề bài mới</text>
  <circle cx="516" cy="180" r="3" fill="#2e7d32"/>
  <text x="524" y="184" font-size="8" fill="#555" font-style="italic">1–2 hành động cụ thể mỗi tuần</text>

  <!-- ══════════════════════════════════════
       Vòng lặp — mũi tên cong quay về ①
  ══════════════════════════════════════ -->
  <path d="M 704,218 Q 360,244 16,218" stroke="#aaa" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="12,213 4,218 12,223" fill="#aaa"/>
  <text x="360" y="242" font-size="8" fill="#888" text-anchor="middle" font-style="italic">Lặp lại mỗi tuần → cải thiện liên tục</text>

</svg>
