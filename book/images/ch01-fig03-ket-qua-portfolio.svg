  <circle cx="120" cy="151" r="52" fill="rgba(255,255,255,0.15)"/>
  <circle cx="120" cy="151" r="44" fill="rgba(255,255,255,0.25)"/>
  <circle cx="120" cy="140" r="18" fill="rgba(255,255,255,0.5)"/>
  <ellipse cx="120" cy="168" rx="28" ry="16" fill="rgba(255,255,255,0.35)"/>

