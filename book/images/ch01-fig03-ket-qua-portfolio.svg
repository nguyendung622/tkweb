  <!-- Video box: x=30 → x=355, width=325 -->
  <rect x="30" y="428" width="325" height="62" fill="#1a1a2e" rx="6"/>
  <!-- Play button ở bên trái, trong ô, khoảng x=60 -->
  <circle cx="68" cy="459" r="18" fill="rgba(255,255,255,0.15)"/>
  <polygon points="76,459 62,451 62,467" fill="white"/>
  <!-- Text video cách play button 20px, bắt đầu x=96, tối đa x=345 -->
  <text x="96" y="452" font-size="11" fill="white">Phóng sự: Làng nghề</text>
  <text x="96" y="467" font-size="11" fill="white">truyền thống Huế</text>
  <text x="96" y="481" font-size="9"  fill="#aaa">5:42 · VTV Huế · 2024</text>

  <!-- Contact box: x=365 → x=690, width=325 -->
  <rect x="365" y="428" width="325" height="62" fill="white" stroke="#e0e0e0" rx="6"/>
  <text x="380" y="446" font-size="11" fill="#333" font-weight="600">Liên hệ hợp tác</text>
  <text x="380" y="461" font-size="10" fill="#1a73e8">✉  nguyenvana@email.com</text>
  <text x="380" y="475" font-size="10" fill="#1a73e8">in  linkedin.com/in/nguyenvana</text>
  <text x="380" y="489" font-size="10" fill="#1a73e8">tw  @nguyenvana_bao</text>

  <!-- ── Caption ── -->
  <rect x="0" y="504" width="720" height="20" fill="#e8eaed"/>
  <text x="360" y="517" font-size="9" fill="#666" text-anchor="middle">Ví dụ minh họa — Trang portfolio nhà báo hoàn chỉnh trên Google Sites</text>

