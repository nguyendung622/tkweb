<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 524" font-family="'Be Vietnam Pro', Arial, sans-serif">

  <rect width="720" height="524" fill="#f0f2f5" rx="8"/>

  <!-- ── Thanh trình duyệt ── -->
