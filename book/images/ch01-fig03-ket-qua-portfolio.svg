  <text x="272" y="386" font-size="9"  fill="#888">VnExpress · 02/02/2025</text>

  <!-- Card 3 -->
  <rect x="490" y="258" width="200" height="134" fill="white" stroke="#e0e0e0" rx="8"/>
  <rect x="490" y="258" width="200" height="70"  fill="#e8f5e9" rx="8"/>
  <rect x="490" y="314" width="200" height="14"  fill="#e8f5e9"/>
