  <text x="200" y="127" font-size="22" fill="white" font-weight="700">Nguyễn Văn A</text>
  <text x="200" y="148" font-size="13" fill="rgba(255,255,255,0.9)">Phóng viên mảng văn hóa – xã hội</text>
