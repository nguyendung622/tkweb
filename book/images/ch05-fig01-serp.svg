<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Be Vietnam Pro', Arial, sans-serif">

  <!-- ① NỀN VÀ CÁC RECT — vẽ trước -->
  <rect width="720" height="420" fill="#f8f9fa" rx="6"/>

  <!-- Thanh tìm kiếm -->
  <rect x="80" y="34" width="560" height="38" fill="white" rx="20" stroke="#dfe1e5" stroke-width="1.5"/>

  <!-- Kết quả 1 -->
  <rect x="78" y="102" width="480" height="145" fill="white" rx="6" stroke="#1a73e8" stroke-width="2"/>

  <!-- Kết quả 2 -->
  <rect x="78" y="258" width="480" height="76" fill="white" rx="6" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Kết quả 3 -->
  <rect x="78" y="344" width="480" height="66" fill="white" rx="6" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Panel chú thích -->
  <rect x="572" y="102" width="140" height="210" fill="white" rx="6" stroke="#ddd" stroke-width="1.5"/>

  <!-- CTR note box -->
  <rect x="580" y="260" width="124" height="36" fill="#fef9e7" rx="4" stroke="#f9a825" stroke-width="1"/>

  <!-- ② NỘI DUNG — vẽ giữa -->

  <!-- Tiêu đề hình -->
  <text x="360" y="22" font-size="12" fill="#555" text-anchor="middle" font-weight="600">Giải phẫu trang kết quả tìm kiếm (SERP)</text>

  <!-- Thanh tìm kiếm -->
  <circle cx="108" cy="53" r="9" fill="none" stroke="#9aa0a6" stroke-width="2"/>
  <line x1="114" y1="59" x2="120" y2="65" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round"/>
  <text x="126" y="58" font-size="13" fill="#202124">ô nhiễm không khí Hà Nội 2024</text>
  <text x="80" y="93" font-size="11" fill="#70757a">Khoảng 4.250.000 kết quả (0,45 giây)</text>

  <!-- Kết quả 1: nội dung -->
  <circle cx="96" cy="121" r="8" fill="#34a853" opacity="0.8"/>
  <text x="110" y="125" font-size="11" fill="#202124" font-weight="600">thoibao.vn</text>
  <text x="110" y="140" font-size="10" fill="#3c8a00">thoibao.vn › moi-truong › o-nhiem-khong-khi-ha-noi-2024</text>
  <text x="92" y="164" font-size="16" fill="#1a0dab" font-weight="600">Ô nhiễm không khí Hà Nội 2024: Nguyên nhân</text>
  <text x="92" y="182" font-size="16" fill="#1a0dab" font-weight="600">và giải pháp | ThoiBao.vn</text>
  <text x="92" y="204" font-size="12" fill="#4d5156">Theo báo cáo của Sở Tài nguyên &amp; Môi trường Hà Nội, chỉ số AQI trung bình</text>
  <text x="92" y="219" font-size="12" fill="#4d5156">tháng 1/2024 đạt mức 162 — ngưỡng "Không lành mạnh". Phóng sự 3 kỳ...</text>
  <text x="92" y="237" font-size="11" fill="#70757a">15 thg 3, 2024 —</text>

  <!-- Kết quả 2: nội dung -->
  <circle cx="96" cy="272" r="8" fill="#4285f4" opacity="0.6"/>
  <text x="110" y="276" font-size="11" fill="#70757a">baomoi.com</text>
  <text x="110" y="288" font-size="10" fill="#70757a">baomoi.com › xa-hoi › o-nhiem-ha-noi</text>
  <text x="92" y="308" font-size="14" fill="#1a0dab">Hà Nội ô nhiễm không khí: Khi nào cải thiện? — Báo Mới</text>
  <text x="92" y="324" font-size="11" fill="#4d5156">Các chuyên gia môi trường nhận định tình trạng ô nhiễm...</text>

  <!-- Kết quả 3: nội dung -->
  <circle cx="96" cy="360" r="8" fill="#ea4335" opacity="0.5"/>
  <text x="110" y="364" font-size="11" fill="#70757a">monre.gov.vn</text>
  <text x="92" y="386" font-size="14" fill="#1a0dab">Báo cáo hiện trạng môi trường không khí 2024 — Bộ TN&amp;MT</text>
  <text x="92" y="400" font-size="11" fill="#4d5156">Bộ Tài nguyên và Môi trường công bố báo cáo thường niên...</text>

  <!-- Panel nội dung -->
  <text x="642" y="122" font-size="11" font-weight="700" fill="#202124" text-anchor="middle">Các yếu tố SERP</text>
  <circle cx="590" cy="144" r="8" fill="#1a73e8"/>
  <text x="590" y="148" font-size="9" fill="white" text-anchor="middle" font-weight="700">①</text>
  <text x="602" y="141" font-size="10" fill="#202124" font-weight="600">Title tag</text>
  <text x="602" y="153" font-size="9" fill="#70757a">50–60 ký tự</text>

  <circle cx="590" cy="174" r="8" fill="#e8710a"/>
  <text x="590" y="178" font-size="9" fill="white" text-anchor="middle" font-weight="700">②</text>
  <text x="602" y="171" font-size="10" fill="#202124" font-weight="600">URL slug</text>
  <text x="602" y="183" font-size="9" fill="#70757a">Ngắn, có từ khóa</text>

  <circle cx="590" cy="204" r="8" fill="#34a853"/>
  <text x="590" y="208" font-size="9" fill="white" text-anchor="middle" font-weight="700">③</text>
  <text x="602" y="201" font-size="10" fill="#202124" font-weight="600">Meta description</text>
  <text x="602" y="213" font-size="9" fill="#70757a">150–160 ký tự</text>

  <circle cx="590" cy="234" r="8" fill="#9334e6"/>
  <text x="590" y="238" font-size="9" fill="white" text-anchor="middle" font-weight="700">④</text>
  <text x="602" y="231" font-size="10" fill="#202124" font-weight="600">Ngày xuất bản</text>
  <text x="602" y="243" font-size="9" fill="#70757a">Tín hiệu tính thời sự</text>

  <text x="642" y="275" font-size="9" fill="#e65100" text-anchor="middle" font-weight="600">CTR ảnh hưởng</text>
  <text x="642" y="287" font-size="9" fill="#e65100" text-anchor="middle">bởi ①②③</text>

  <!-- ③ CHÚ THÍCH ANNOTATION — vẽ cuối cùng (trên cùng) -->

  <!-- ① Title tag -->
  <line x1="558" y1="172" x2="450" y2="172" stroke="#1a73e8" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="558" cy="172" r="10" fill="#1a73e8"/>
  <text x="558" y="176" font-size="10" fill="white" text-anchor="middle" font-weight="700">①</text>

  <!-- ② URL slug -->
  <line x1="558" y1="140" x2="440" y2="140" stroke="#e8710a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="558" cy="140" r="10" fill="#e8710a"/>
  <text x="558" y="144" font-size="10" fill="white" text-anchor="middle" font-weight="700">②</text>

  <!-- ③ Meta description -->
  <line x1="558" y1="211" x2="480" y2="211" stroke="#34a853" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="558" cy="211" r="10" fill="#34a853"/>
  <text x="558" y="215" font-size="10" fill="white" text-anchor="middle" font-weight="700">③</text>

  <!-- ④ Ngày -->
  <circle cx="182" cy="237" r="9" fill="#9334e6"/>
  <text x="182" y="241" font-size="9" fill="white" text-anchor="middle" font-weight="700">④</text>

</svg>
