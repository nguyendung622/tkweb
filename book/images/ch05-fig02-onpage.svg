<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="'Be Vietnam Pro', Arial, sans-serif">

  <!-- ① NỀN VÀ CÁC RECT — vẽ trước -->
  <rect width="720" height="460" fill="#f5f5f5" rx="6"/>
  <!-- Browser window -->
  <rect x="30" y="32" width="480" height="410" fill="white" rx="8" stroke="#ddd" stroke-width="1.5"/>
  <!-- Browser bar -->
  <rect x="30" y="32" width="480" height="32" fill="#f1f3f4" rx="8"/>
  <rect x="30" y="48" width="480" height="16" fill="#f1f3f4"/>
  <!-- URL bar -->
  <rect x="100" y="38" width="340" height="20" fill="white" rx="10" stroke="#dadce0" stroke-width="1"/>
  <!-- Ảnh placeholder -->
  <rect x="50" y="162" width="420" height="80" fill="#e3f2fd" rx="4"/>
  <!-- Panel chú thích -->
  <rect x="524" y="32" width="188" height="420" fill="white" rx="8" stroke="#ddd" stroke-width="1.5"/>
  <!-- Divider trong panel -->
  <line x1="540" y1="62" x2="700" y2="62" stroke="#eee" stroke-width="1"/>
  <line x1="540" y1="232" x2="700" y2="232" stroke="#eee" stroke-width="1"/>

  <!-- ② NỘI DUNG — vẽ giữa -->
  <text x="360" y="22" font-size="12" fill="#444" text-anchor="middle" font-weight="600">Các yếu tố On-page SEO trong một bài báo</text>

  <!-- Browser controls -->
  <circle cx="50" cy="48" r="5" fill="#ff5f57"/>
  <circle cx="66" cy="48" r="5" fill="#febc2e"/>
  <circle cx="82" cy="48" r="5" fill="#28c840"/>
  <text x="115" y="52" font-size="10" fill="#34a853">🔒</text>
  <text x="128" y="52" font-size="10" fill="#e8710a" font-weight="600">thoibao.vn/moi-truong/</text>
  <text x="274" y="52" font-size="10" fill="#202124" font-weight="600">o-nhiem-ha-noi-2024</text>

  <!-- Nội dung trang -->
  <text x="50" y="86" font-size="9" fill="#70757a">Trang chủ › Môi trường › Ô nhiễm không khí</text>
  <text x="50" y="112" font-size="18" fill="#202124" font-weight="900">Ô nhiễm không khí Hà Nội 2024:</text>
  <text x="50" y="134" font-size="18" fill="#202124" font-weight="900">Nguyên nhân và giải pháp</text>
  <text x="50" y="154" font-size="10" fill="#70757a">Nguyễn Văn A · Phóng viên môi trường · 15/03/2024</text>

  <!-- Ảnh nội dung -->
  <text x="260" y="200" font-size="11" fill="#1565c0" text-anchor="middle">[Ảnh: Bầu trời Hà Nội mù mịt khói bụi]</text>
  <text x="260" y="216" font-size="9" fill="#78909c" text-anchor="middle">alt="Bầu trời Hà Nội phủ khói bụi dày đặc, tháng 1/2024"</text>

  <!-- Lead paragraph -->
  <text x="50" y="262" font-size="11" fill="#3c4043">Theo báo cáo của Sở Tài nguyên &amp; Môi trường Hà Nội, chỉ số AQI</text>
  <text x="50" y="277" font-size="11" fill="#3c4043">trung bình tháng 1/2024 đạt mức 162 — ngưỡng "Không lành mạnh".</text>

  <!-- H2 -->
  <text x="50" y="308" font-size="14" fill="#202124" font-weight="700">Nguyên nhân chính gây ô nhiễm</text>

  <!-- Nội dung + internal link -->
  <text x="50" y="328" font-size="11" fill="#3c4043">Khí thải từ các khu công nghiệp chiếm 35% nguồn ô nhiễm. Theo</text>
  <text x="50" y="343" font-size="11" fill="#1a0dab" text-decoration="underline">nghiên cứu về ô nhiễm công nghiệp miền Bắc</text>
  <text x="265" y="343" font-size="11" fill="#3c4043">, tình trạng này...</text>

  <!-- H3 + nội dung -->
  <text x="50" y="368" font-size="12" fill="#202124" font-weight="600">Giải pháp từ chính quyền thành phố</text>
  <text x="50" y="385" font-size="11" fill="#3c4043">UBND Hà Nội đã ban hành Kế hoạch hành động về chất lượng...</text>

  <!-- Panel: tiêu đề và legend -->
  <text x="618" y="52" font-size="11" font-weight="700" fill="#202124" text-anchor="middle">On-page SEO</text>

  <circle cx="547" cy="83" r="9" fill="#1a73e8"/>
  <text x="547" y="87" font-size="9" fill="white" text-anchor="middle" font-weight="700">①</text>
  <text x="561" y="80" font-size="10" fill="#202124" font-weight="600">H1 — Tiêu đề chính</text>
  <text x="561" y="92" font-size="9" fill="#70757a">Chứa từ khóa chính</text>

  <circle cx="547" cy="113" r="9" fill="#e8710a"/>
  <text x="547" y="117" font-size="9" fill="white" text-anchor="middle" font-weight="700">②</text>
  <text x="561" y="110" font-size="10" fill="#202124" font-weight="600">URL slug</text>
  <text x="561" y="122" font-size="9" fill="#70757a">Ngắn, không dấu</text>

  <circle cx="547" cy="143" r="9" fill="#34a853"/>
  <text x="547" y="147" font-size="9" fill="white" text-anchor="middle" font-weight="700">③</text>
  <text x="561" y="140" font-size="10" fill="#202124" font-weight="600">H2/H3 — Tiêu đề phụ</text>
  <text x="561" y="152" font-size="9" fill="#70757a">Cấu trúc nội dung</text>

  <circle cx="547" cy="173" r="9" fill="#f4a261"/>
  <text x="547" y="177" font-size="9" fill="white" text-anchor="middle" font-weight="700">④</text>
  <text x="561" y="170" font-size="10" fill="#202124" font-weight="600">Internal link</text>
  <text x="561" y="182" font-size="9" fill="#70757a">Anchor text mô tả</text>

  <circle cx="547" cy="203" r="9" fill="#9334e6"/>
  <text x="547" y="207" font-size="9" fill="white" text-anchor="middle" font-weight="700">⑤</text>
  <text x="561" y="200" font-size="10" fill="#202124" font-weight="600">Alt text ảnh</text>
  <text x="561" y="212" font-size="9" fill="#70757a">Mô tả nội dung ảnh</text>

  <!-- Checklist -->
  <text x="561" y="248" font-size="10" fill="#444" font-weight="600">Còn cần kiểm tra:</text>
  <text x="540" y="266" font-size="11" fill="#34a853">✓</text>
  <text x="554" y="266" font-size="10" fill="#444">Meta description</text>
  <text x="540" y="283" font-size="11" fill="#34a853">✓</text>
  <text x="554" y="283" font-size="10" fill="#444">Tốc độ tải trang</text>
  <text x="540" y="300" font-size="11" fill="#34a853">✓</text>
  <text x="554" y="300" font-size="10" fill="#444">HTTPS</text>
  <text x="540" y="317" font-size="11" fill="#34a853">✓</text>
  <text x="554" y="317" font-size="10" fill="#444">Schema markup</text>
  <text x="540" y="334" font-size="11" fill="#34a853">✓</text>
  <text x="554" y="334" font-size="10" fill="#444">Từ khóa trong lead</text>

  <!-- ③ CHÚ THÍCH ANNOTATION — vẽ cuối cùng -->

  <!-- ① H1 -->
  <line x1="514" y1="120" x2="390" y2="120" stroke="#1a73e8" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="514" cy="120" r="10" fill="#1a73e8"/>
  <text x="514" y="124" font-size="10" fill="white" text-anchor="middle" font-weight="700">①</text>

  <!-- ② URL -->
  <line x1="514" y1="48" x2="446" y2="48" stroke="#e8710a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="514" cy="48" r="10" fill="#e8710a"/>
  <text x="514" y="52" font-size="10" fill="white" text-anchor="middle" font-weight="700">②</text>

  <!-- ③ H2 -->
  <line x1="514" y1="305" x2="340" y2="305" stroke="#34a853" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="514" cy="305" r="10" fill="#34a853"/>
  <text x="514" y="309" font-size="10" fill="white" text-anchor="middle" font-weight="700">③</text>

  <!-- ④ Internal link -->
  <line x1="514" y1="338" x2="425" y2="338" stroke="#f4a261" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="514" cy="338" r="10" fill="#f4a261"/>
  <text x="514" y="342" font-size="10" fill="white" text-anchor="middle" font-weight="700">④</text>

  <!-- ⑤ Alt text -->
  <line x1="514" y1="208" x2="474" y2="208" stroke="#9334e6" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="514" cy="208" r="10" fill="#9334e6"/>
  <text x="514" y="212" font-size="10" fill="white" text-anchor="middle" font-weight="700">⑤</text>

</svg>
