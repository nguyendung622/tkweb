<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 234" font-family="'Be Vietnam Pro', Arial, sans-serif">

  <!-- NỀN -->
  <rect width="720" height="234" fill="#f5f6f8" rx="6"/>

  <!-- Tiêu đề -->
  <text x="360" y="16" font-size="13" fill="#1a1a2e" text-anchor="middle" font-weight="700">Google Search Console — 4 chỉ số &amp; chiến lược theo vị trí</text>

  <!-- ══════════════════════════════════════
       PHẦN TRÁI: 4 Metric cards (2×2)
  ══════════════════════════════════════ -->

  <!-- Card Impressions (blue) -->
  <rect x="8" y="26" width="152" height="84" fill="white" rx="4" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="8" y="26" width="152" height="26" fill="#1565c0" rx="4"/>
  <rect x="8" y="40" width="152" height="12" fill="#1565c0"/>
  <text x="84" y="38" font-size="9.5" fill="white" text-anchor="middle" font-weight="700">Impressions</text>
  <text x="84" y="61" font-size="8" fill="#1565c0" text-anchor="middle" font-weight="700">Hiển thị trong tìm kiếm</text>
  <text x="84" y="75" font-size="7.5" fill="#555" text-anchor="middle">Nhiều = chủ đề có nhu cầu</text>
  <text x="84" y="101" font-size="7" fill="#888" text-anchor="middle" font-style="italic">Không thấy trang? Kiểm tra noindex</text>

  <!-- Card Clicks (green) -->
  <rect x="168" y="26" width="152" height="84" fill="white" rx="4" stroke="#2e7d32" stroke-width="1.5"/>
  <rect x="168" y="26" width="152" height="26" fill="#2e7d32" rx="4"/>
  <rect x="168" y="40" width="152" height="12" fill="#2e7d32"/>
  <text x="244" y="38" font-size="9.5" fill="white" text-anchor="middle" font-weight="700">Clicks</text>
  <text x="244" y="61" font-size="8" fill="#2e7d32" text-anchor="middle" font-weight="700">Lượt nhấp thực tế</text>
  <text x="244" y="75" font-size="7.5" fill="#555" text-anchor="middle">Số người thực sự vào trang</text>
  <text x="244" y="101" font-size="7" fill="#888" text-anchor="middle" font-style="italic">Clicks ÷ Impressions = CTR</text>

  <!-- Card CTR (orange) -->
  <rect x="8" y="118" width="152" height="84" fill="white" rx="4" stroke="#e65100" stroke-width="1.5"/>
  <rect x="8" y="118" width="152" height="26" fill="#e65100" rx="4"/>
  <rect x="8" y="132" width="152" height="12" fill="#e65100"/>
  <text x="84" y="130" font-size="9.5" fill="white" text-anchor="middle" font-weight="700">CTR</text>
  <text x="84" y="153" font-size="8" fill="#e65100" text-anchor="middle" font-weight="700">Click-Through Rate</text>
  <text x="84" y="167" font-size="7.5" fill="#555" text-anchor="middle">Báo chí: 2–5%; tốt: &gt;5%</text>
  <text x="84" y="193" font-size="7" fill="#888" text-anchor="middle" font-style="italic">Title + Meta quyết định CTR</text>

  <!-- Card Position (purple) -->
  <rect x="168" y="118" width="152" height="84" fill="white" rx="4" stroke="#4a148c" stroke-width="1.5"/>
  <rect x="168" y="118" width="152" height="26" fill="#4a148c" rx="4"/>
  <rect x="168" y="132" width="152" height="12" fill="#4a148c"/>
  <text x="244" y="130" font-size="9.5" fill="white" text-anchor="middle" font-weight="700">Position</text>
  <text x="244" y="153" font-size="8" fill="#4a148c" text-anchor="middle" font-weight="700">Vị trí xếp hạng trung bình</text>
  <text x="244" y="167" font-size="7.5" fill="#555" text-anchor="middle">Top 10 = trang 1 Google</text>
  <text x="244" y="193" font-size="7" fill="#888" text-anchor="middle" font-style="italic">Top 3 = xuất sắc</text>

  <!-- Separator dọc -->
  <line x1="336" y1="26" x2="336" y2="208" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ══════════════════════════════════════
       PHẦN PHẢI: Chiến lược theo vị trí
  ══════════════════════════════════════ -->
  <text x="530" y="40" font-size="10" fill="#333" text-anchor="middle" font-weight="700">Chiến lược theo vị trí</text>

  <!-- Zone 1–3: Top performers (green) -->
  <rect x="348" y="48" width="364" height="46" fill="#e8f5e9" rx="4" stroke="#4caf50" stroke-width="1.5"/>
  <rect x="348" y="48" width="68" height="46" fill="#4caf50" rx="4"/>
  <rect x="382" y="48" width="34" height="46" fill="#4caf50"/>
  <text x="382" y="64" font-size="9" fill="white" text-anchor="middle" font-weight="700">Top</text>
  <text x="382" y="79" font-size="9" fill="white" text-anchor="middle" font-weight="700">1–3</text>
  <text x="430" y="64" font-size="8.5" fill="#1b5e20" font-weight="700">Đang xếp hạng tốt</text>
  <text x="430" y="79" font-size="7.5" fill="#388e3c">Duy trì: cập nhật nội dung định kỳ</text>

  <!-- Zone 4–15: Cơ hội vàng (orange, highlighted) -->
  <rect x="348" y="102" width="364" height="56" fill="#fff3e0" rx="4" stroke="#ff9800" stroke-width="2"/>
  <rect x="348" y="102" width="68" height="56" fill="#ff9800" rx="4"/>
  <rect x="382" y="102" width="34" height="56" fill="#ff9800"/>
  <text x="382" y="122" font-size="8.5" fill="white" text-anchor="middle" font-weight="700">Top</text>
  <text x="382" y="134" font-size="8.5" fill="white" text-anchor="middle" font-weight="700">4–15</text>
  <text x="382" y="148" font-size="7" fill="white" text-anchor="middle">★</text>
  <text x="430" y="118" font-size="8.5" fill="#e65100" font-weight="700">Cơ hội vàng — Low-hanging fruit</text>
  <text x="430" y="131" font-size="7.5" fill="#f57c00">Cải thiện Title + Meta Description</text>
  <text x="430" y="144" font-size="7.5" fill="#f57c00">→ tăng CTR mà không cần viết lại bài</text>

  <!-- Zone 16+: Cần tối ưu (gray) -->
  <rect x="348" y="166" width="364" height="42" fill="#f5f5f5" rx="4" stroke="#bdbdbd" stroke-width="1.5"/>
  <rect x="348" y="166" width="68" height="42" fill="#9e9e9e" rx="4"/>
  <rect x="382" y="166" width="34" height="42" fill="#9e9e9e"/>
  <text x="382" y="183" font-size="9" fill="white" text-anchor="middle" font-weight="700">Top</text>
  <text x="382" y="197" font-size="9" fill="white" text-anchor="middle" font-weight="700">16+</text>
  <text x="430" y="182" font-size="8.5" fill="#424242" font-weight="700">Cần đầu tư nhiều hơn</text>
  <text x="430" y="196" font-size="7.5" fill="#757575">Bổ sung nội dung, xây dựng backlinks</text>

  <!-- Ghi chú cuối -->
  <rect x="8" y="212" width="704" height="18" fill="#fff9c4" rx="3"/>
  <text x="360" y="225" font-size="7.5" fill="#f57f17" text-anchor="middle">Dữ liệu Search Console có độ trễ 2–3 ngày — so sánh theo khoảng thời gian dài (28 ngày) để có xu hướng ổn định</text>

</svg>
