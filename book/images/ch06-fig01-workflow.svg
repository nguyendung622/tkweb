<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 282" font-family="'Be Vietnam Pro', Arial, sans-serif">

  <!-- ① NỀN VÀ BOXES — vẽ trước -->
  <rect width="720" height="282" fill="#f8f9fa" rx="6"/>

  <!-- 5 bước — hộp nền -->
  <rect x="40"  y="56" width="104" height="120" fill="#e3f2fd" rx="8" stroke="#1a73e8" stroke-width="1.8"/>
  <rect x="174" y="56" width="104" height="120" fill="#fff3e0" rx="8" stroke="#e8710a" stroke-width="1.8"/>
  <rect x="308" y="56" width="104" height="120" fill="#f3e5f5" rx="8" stroke="#9334e6" stroke-width="1.8"/>
  <rect x="442" y="56" width="104" height="120" fill="#e8f5e9" rx="8" stroke="#34a853" stroke-width="1.8"/>
  <rect x="576" y="56" width="104" height="120" fill="#e0f7fa" rx="8" stroke="#00acc1" stroke-width="1.8"/>

  <!-- ② TEXT BÊN TRONG — vẽ giữa -->
  <text x="360" y="24" font-size="13" fill="#333" text-anchor="middle" font-weight="700">Quy trình 5 bước của báo chí dữ liệu</text>
  <text x="360" y="40" font-size="9.5" fill="#666" text-anchor="middle">(Không nhất thiết tuyến tính — đôi khi cần quay lại bước trước)</text>

  <!-- Bước 1: Thu thập -->
  <text x="92"  y="88"  font-size="11" fill="#1a73e8" text-anchor="middle" font-weight="700">Thu thập</text>
  <text x="92"  y="101" font-size="9"  fill="#1565c0" text-anchor="middle">Collect</text>
  <text x="92"  y="117" font-size="9"  fill="#1565c0" text-anchor="middle">Tải dữ liệu, yêu</text>
  <text x="92"  y="129" font-size="9"  fill="#1565c0" text-anchor="middle">cầu công khai,</text>
  <text x="92"  y="141" font-size="9"  fill="#1565c0" text-anchor="middle">scraping</text>
  <text x="92"  y="158" font-size="9"  fill="#1a73e8" text-anchor="middle" font-weight="600">≈ 10% thời gian</text>

  <!-- Bước 2: Làm sạch -->
  <text x="226" y="88"  font-size="11" fill="#e8710a" text-anchor="middle" font-weight="700">Làm sạch</text>
  <text x="226" y="101" font-size="9"  fill="#bf360c" text-anchor="middle">Clean</text>
  <text x="226" y="117" font-size="9"  fill="#bf360c" text-anchor="middle">Xử lý thiếu,</text>
  <text x="226" y="129" font-size="9"  fill="#bf360c" text-anchor="middle">trùng lặp, sai</text>
  <text x="226" y="141" font-size="9"  fill="#bf360c" text-anchor="middle">định dạng</text>
  <text x="226" y="158" font-size="9"  fill="#e8710a" text-anchor="middle" font-weight="700">60–80% thời gian</text>

  <!-- Bước 3: Phân tích -->
  <text x="360" y="88"  font-size="11" fill="#9334e6" text-anchor="middle" font-weight="700">Phân tích</text>
  <text x="360" y="101" font-size="9"  fill="#6a1b9a" text-anchor="middle">Analyze</text>
  <text x="360" y="117" font-size="9"  fill="#6a1b9a" text-anchor="middle">Lọc, so sánh,</text>
  <text x="360" y="129" font-size="9"  fill="#6a1b9a" text-anchor="middle">tính tỷ lệ, tìm</text>
  <text x="360" y="141" font-size="9"  fill="#6a1b9a" text-anchor="middle">xu hướng</text>
  <text x="360" y="158" font-size="9"  fill="#9334e6" text-anchor="middle" font-weight="600">≈ 10% thời gian</text>

  <!-- Bước 4: Trực quan hóa -->
  <text x="494" y="88"  font-size="11" fill="#34a853" text-anchor="middle" font-weight="700">Trực quan hóa</text>
  <text x="494" y="101" font-size="9"  fill="#1b5e20" text-anchor="middle">Visualize</text>
  <text x="494" y="117" font-size="9"  fill="#1b5e20" text-anchor="middle">Biểu đồ, bản</text>
  <text x="494" y="129" font-size="9"  fill="#1b5e20" text-anchor="middle">đồ, ảnh đồ họa</text>
  <text x="494" y="141" font-size="9"  fill="#1b5e20" text-anchor="middle">tương tác</text>
  <text x="494" y="158" font-size="9"  fill="#34a853" text-anchor="middle" font-weight="600">≈ 10% thời gian</text>

  <!-- Bước 5: Kể chuyện -->
  <text x="628" y="88"  font-size="11" fill="#00acc1" text-anchor="middle" font-weight="700">Kể chuyện</text>
  <text x="628" y="101" font-size="9"  fill="#006064" text-anchor="middle">Narrate</text>
  <text x="628" y="117" font-size="9"  fill="#006064" text-anchor="middle">Đặt bối cảnh,</text>
  <text x="628" y="129" font-size="9"  fill="#006064" text-anchor="middle">kết nối con người,</text>
  <text x="628" y="141" font-size="9"  fill="#006064" text-anchor="middle">ý nghĩa &gt; số</text>
  <text x="628" y="158" font-size="9"  fill="#00acc1" text-anchor="middle" font-weight="600">≈ 10% thời gian</text>

  <!-- Mũi tên giữa các bước -->
  <line x1="147" y1="116" x2="169" y2="116" stroke="#888" stroke-width="2"/>
  <polygon points="170,116 162,111 162,121" fill="#888"/>
  <line x1="281" y1="116" x2="303" y2="116" stroke="#888" stroke-width="2"/>
  <polygon points="304,116 296,111 296,121" fill="#888"/>
  <line x1="415" y1="116" x2="437" y2="116" stroke="#888" stroke-width="2"/>
  <polygon points="438,116 430,111 430,121" fill="#888"/>
  <line x1="549" y1="116" x2="571" y2="116" stroke="#888" stroke-width="2"/>
  <polygon points="572,116 564,111 564,121" fill="#888"/>

  <!-- Ghi chú cuối -->
  <rect x="86" y="192" width="548" height="58" fill="#fff9c4" rx="5" stroke="#f9a825" stroke-width="1"/>
  <text x="360" y="208" font-size="10" fill="#e65100" text-anchor="middle" font-weight="700">💡 Quy trình thực tế không bao giờ hoàn toàn tuyến tính:</text>
  <text x="360" y="222" font-size="9.5" fill="#5d4037" text-anchor="middle">Khi phân tích, bạn thường phát hiện dữ liệu cần làm sạch thêm. Khi trực quan hóa, một góc nhìn mới</text>
  <text x="360" y="234" font-size="9.5" fill="#5d4037" text-anchor="middle">có thể đòi hỏi quay lại phân tích từ đầu. Đây là phần bình thường của quy trình làm báo chí dữ liệu.</text>

  <!-- ③ CÁC VÒNG SỐ THỨ TỰ — vẽ SAU CÙNG -->
  <circle cx="92"  cy="62" r="13" fill="#1a73e8"/>
  <text x="92"  y="66.5" font-size="11" fill="white" text-anchor="middle" font-weight="700">1</text>

  <circle cx="226" cy="62" r="13" fill="#e8710a"/>
  <text x="226" y="66.5" font-size="11" fill="white" text-anchor="middle" font-weight="700">2</text>

  <circle cx="360" cy="62" r="13" fill="#9334e6"/>
  <text x="360" y="66.5" font-size="11" fill="white" text-anchor="middle" font-weight="700">3</text>

  <circle cx="494" cy="62" r="13" fill="#34a853"/>
  <text x="494" y="66.5" font-size="11" fill="white" text-anchor="middle" font-weight="700">4</text>

  <circle cx="628" cy="62" r="13" fill="#00acc1"/>
  <text x="628" y="66.5" font-size="11" fill="white" text-anchor="middle" font-weight="700">5</text>

</svg>
