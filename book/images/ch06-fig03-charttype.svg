<!-- ===== Ô 3: Donut chart ===== -->
<!-- Dùng stroke-dasharray trên đường tròn — không cần arc path -->
<g clip-path="url(#cc3)">
  <!-- Nền xám -->
  <circle cx="354" cy="128" r="34" fill="none" stroke="#f0f0f0" stroke-width="18"/>
  <!-- Segment 1: 40% xanh dương — dasharray=circumference×0.4, offset=0 -->
  <!-- C=2π×34≈213.6 · 40%=85.4 · 30%=64.1 · 20%=42.7 · 10%=21.4 -->
  <circle cx="354" cy="128" r="34" fill="none" stroke="#1e88e5" stroke-width="18"
    stroke-dasharray="85.4 213.6" stroke-dashoffset="0"
    transform="rotate(-90 354 128)"/>
  <!-- Segment 2: 30% cam — offset=-(40%×C)=-85.4 -->
  <circle cx="354" cy="128" r="34" fill="none" stroke="#fb8c00" stroke-width="18"
    stroke-dasharray="64.1 213.6" stroke-dashoffset="-85.4"
    transform="rotate(-90 354 128)"/>
  <!-- Segment 3: 20% xanh lá — offset=-(70%×C)=-149.5 -->
  <circle cx="354" cy="128" r="34" fill="none" stroke="#43a047" stroke-width="18"
    stroke-dasharray="42.7 213.6" stroke-dashoffset="-149.5"
    transform="rotate(-90 354 128)"/>
  <!-- Segment 4: 10% tím — offset=-(90%×C)=-192.2 -->
  <circle cx="354" cy="128" r="34" fill="none" stroke="#8e24aa" stroke-width="18"
    stroke-dasharray="21.4 213.6" stroke-dashoffset="-192.2"
    transform="rotate(-90 354 128)"/>
  <!-- Lõi trắng -->
  <circle cx="354" cy="128" r="23" fill="white"/>
  <text x="354" y="125" font-size="8"  fill="#555" text-anchor="middle">Cơ</text>
  <text x="354" y="136" font-size="8"  fill="#555" text-anchor="middle">cấu</text>
</g>
