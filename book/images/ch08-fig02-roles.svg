  <text x="218" y="228" font-size="7"   fill="#bbb"   text-anchor="middle">Tỷ lệ 1:1 hoặc</text>
  <text x="218" y="238" font-size="7"   fill="#bbb"   text-anchor="middle">3:2 cho báo online</text>
  <text x="218" y="261" font-size="8"   fill="#2e7d32" text-anchor="middle" font-weight="700">Web / App / In</text>

