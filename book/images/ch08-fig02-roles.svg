<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 308" font-family="'Be Vietnam Pro', Arial, sans-serif">

  <!-- ① NỀN -->
  <rect width="720" height="308" fill="#f5f6f8" rx="6"/>

  <!-- Tiêu đề -->
  <text x="360" y="20" font-size="13" fill="#1a1a2e" text-anchor="middle" font-weight="700">Mỗi phương tiện có vai trò riêng trong câu chuyện đa phương tiện</text>
  <text x="360" y="34" font-size="9" fill="#666" text-anchor="middle">Tránh để hai phương tiện mô tả cùng một thông tin — mỗi cái làm việc nó giỏi nhất</text>

  <!-- ═══ 5 thẻ phương tiện ═══ -->
  <!-- Định nghĩa: x=10,152,294,436,578 · w=132 · y=44 · h=226 -->

  <!-- Card 1: Văn bản (blue #1565c0) -->
  <rect x="10"  y="44" width="132" height="226" fill="white" rx="6" stroke="#90caf9" stroke-width="1.2"/>
  <rect x="10"  y="44" width="132" height="34"  fill="#1565c0" rx="6"/>
  <rect x="10"  y="64" width="132" height="14"  fill="#1565c0"/>
  <text x="76"  y="66" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">Văn bản</text>
  <text x="76"  y="90"  font-size="8.5" fill="#1565c0" text-anchor="middle" font-weight="700">Giỏi nhất ở:</text>
  <text x="76"  y="104" font-size="8"   fill="#333"   text-anchor="middle">✓ Phân tích, lập luận</text>
  <text x="76"  y="117" font-size="8"   fill="#333"   text-anchor="middle">✓ Giải thích bối cảnh</text>
  <text x="76"  y="130" font-size="8"   fill="#333"   text-anchor="middle">✓ Trích dẫn chính xác</text>
  <text x="76"  y="143" font-size="8"   fill="#333"   text-anchor="middle">✓ Lập luận nhiều chiều</text>
  <line x1="20" y1="156" x2="132" y2="156" stroke="#e3f2fd" stroke-width="1"/>
  <text x="76"  y="168" font-size="7.5" fill="#999"   text-anchor="middle" font-style="italic">Kém hơn ở:</text>
  <text x="76"  y="180" font-size="7.5" fill="#aaa"   text-anchor="middle">Tái hiện cảm xúc</text>
  <text x="76"  y="191" font-size="7.5" fill="#aaa"   text-anchor="middle">tức thì, không khí</text>
