  <text x="218" y="168" font-size="7.5" fill="#999"   text-anchor="middle" font-style="italic">Kém hơn ở:</text>
  <text x="218" y="180" font-size="7.5" fill="#aaa"   text-anchor="middle">Giải thích nguyên nhân,</text>
