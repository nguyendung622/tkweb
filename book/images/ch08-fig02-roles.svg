  <rect x="436" y="64" width="132" height="14"  fill="#6a1b9a"/>
  <text x="502" y="66" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">Âm thanh</text>
  <text x="502" y="90"  font-size="8.5" fill="#6a1b9a" text-anchor="middle" font-weight="700">Giỏi nhất ở:</text>
  <text x="502" y="104" font-size="8"   fill="#333"   text-anchor="middle">✓ Tiếng động hiện trường</text>
  <text x="502" y="117" font-size="8"   fill="#333"   text-anchor="middle">✓ Cảm giác hiện diện</text>
  <text x="502" y="130" font-size="8"   fill="#333"   text-anchor="middle">✓ Giọng nói cảm xúc</text>
  <text x="502" y="143" font-size="8"   fill="#333"   text-anchor="middle">✓ Nghe khi di chuyển</text>
  <line x1="446" y1="156" x2="558" y2="156" stroke="#f3e5f5" stroke-width="1"/>
  <text x="502" y="168" font-size="7.5" fill="#999"   text-anchor="middle" font-style="italic">Kém hơn ở:</text>
  <text x="502" y="180" font-size="7.5" fill="#aaa"   text-anchor="middle">Nhiều số liệu, biểu</text>
  <text x="502" y="191" font-size="7.5" fill="#aaa"   text-anchor="middle">đồ, nội dung phức tạp</text>
  <rect x="444" y="200" width="116" height="18" fill="#f3e5f5" rx="9"/>
  <text x="502" y="213" font-size="7.5" fill="#6a1b9a" text-anchor="middle" font-weight="600">Công cụ: Audacity</text>
  <text x="502" y="228" font-size="7"   fill="#bbb"   text-anchor="middle">MP3 128kbps</text>
  <text x="502" y="238" font-size="7"   fill="#bbb"   text-anchor="middle">cho podcast</text>
  <text x="502" y="261" font-size="8"   fill="#6a1b9a" text-anchor="middle" font-weight="700">Spotify / SoundCloud</text>

  <!-- Card 5: Biểu đồ (orange #e65100) -->
  <rect x="578" y="44" width="132" height="226" fill="white" rx="6" stroke="#ffcc80" stroke-width="1.2"/>
  <rect x="578" y="44" width="132" height="34"  fill="#e65100" rx="6"/>
  <rect x="578" y="64" width="132" height="14"  fill="#e65100"/>
  <text x="644" y="66" font-size="10.5" fill="white" text-anchor="middle" font-weight="700">Biểu đồ / Dữ liệu</text>
  <text x="644" y="90"  font-size="8.5" fill="#e65100" text-anchor="middle" font-weight="700">Giỏi nhất ở:</text>
  <text x="644" y="104" font-size="8"   fill="#333"   text-anchor="middle">✓ Xu hướng theo thời gian</text>
  <text x="644" y="117" font-size="8"   fill="#333"   text-anchor="middle">✓ So sánh quy mô</text>
  <text x="644" y="130" font-size="8"   fill="#333"   text-anchor="middle">✓ Dữ liệu phức tạp</text>
  <text x="644" y="143" font-size="8"   fill="#333"   text-anchor="middle">✓ Đọc nhanh, trực quan</text>
  <line x1="588" y1="156" x2="700" y2="156" stroke="#fff3e0" stroke-width="1"/>
  <text x="644" y="168" font-size="7.5" fill="#999"   text-anchor="middle" font-style="italic">Kém hơn ở:</text>
  <text x="644" y="180" font-size="7.5" fill="#aaa"   text-anchor="middle">Kể chuyện cá nhân,</text>
  <text x="644" y="191" font-size="7.5" fill="#aaa"   text-anchor="middle">cảm xúc con người</text>
  <rect x="586" y="200" width="116" height="18" fill="#fff3e0" rx="9"/>
  <text x="644" y="213" font-size="7.5" fill="#e65100" text-anchor="middle" font-weight="600">Công cụ: Flourish</text>
  <text x="644" y="228" font-size="7"   fill="#bbb"   text-anchor="middle">Nhúng iframe</text>
  <text x="644" y="238" font-size="7"   fill="#bbb"   text-anchor="middle">vào Google Sites</text>
  <text x="644" y="261" font-size="8"   fill="#e65100" text-anchor="middle" font-weight="700">Web / App</text>

  <!-- Ghi chú cuối -->
  <rect x="8" y="280" width="704" height="22" fill="#fffde7" rx="4" stroke="#f9a825" stroke-width="1"/>
  <text x="360" y="295" font-size="9.5" fill="#e65100" text-anchor="middle">Nguyên tắc vàng: Ảnh không cần caption mô tả lại nội dung ảnh · Video không cần trích nguyên văn trong bài viết</text>

</svg>
