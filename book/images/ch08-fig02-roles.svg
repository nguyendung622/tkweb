  <text x="76"  y="213" font-size="7.5" fill="#1565c0" text-anchor="middle" font-weight="600">Công cụ: Google Docs</text>
  <text x="76"  y="228" font-size="7"   fill="#bbb"   text-anchor="middle">Không giới hạn</text>
  <text x="76"  y="238" font-size="7"   fill="#bbb"   text-anchor="middle">độ sâu nội dung</text>
  <text x="76"  y="261" font-size="8"   fill="#1565c0" text-anchor="middle" font-weight="700">Báo in / Online / App</text>

