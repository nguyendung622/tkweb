  <text x="360" y="213" font-size="7.5" fill="#c62828" text-anchor="middle" font-weight="600">Công cụ: CapCut</text>
  <text x="360" y="228" font-size="7"   fill="#bbb"   text-anchor="middle">16:9 YouTube</text>
  <text x="360" y="238" font-size="7"   fill="#bbb"   text-anchor="middle">9:16 TikTok/Reels</text>
  <text x="360" y="261" font-size="8"   fill="#c62828" text-anchor="middle" font-weight="700">YouTube / TikTok / FB</text>

  <!-- Card 4: Âm thanh (purple #6a1b9a) -->
  <rect x="436" y="44" width="132" height="226" fill="white" rx="6" stroke="#ce93d8" stroke-width="1.2"/>
