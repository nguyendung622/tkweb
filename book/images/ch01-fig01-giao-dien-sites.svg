<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Be Vietnam Pro', Arial, sans-serif">

  <!-- Nền trình duyệt -->
  <rect width="800" height="520" fill="#f0f2f5" rx="8"/>

  <!-- Thanh trình duyệt -->
  <rect x="0" y="0" width="800" height="36" fill="#dee1e6" rx="8"/>
  <rect x="0" y="20" width="800" height="16" fill="#dee1e6"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#febc2e"/>
  <circle cx="62" cy="18" r="6" fill="#28c840"/>
  <rect x="120" y="8" width="440" height="20" fill="white" rx="10"/>
  <text x="340" y="22" font-size="11" fill="#666" text-anchor="middle">sites.google.com/u/0/sites/create</text>

  <!-- ① THANH CÔNG CỤ PHÍA TRÊN -->
  <rect x="0" y="36" width="800" height="48" fill="white"/>
  <rect x="0" y="83" width="800" height="1" fill="#e0e0e0"/>

  <!-- Logo + tên trang -->
  <rect x="12" y="46" width="24" height="24" fill="#4285F4" rx="4"/>
  <text x="18" y="62" font-size="14" fill="white" font-weight="bold">S</text>
  <text x="42" y="63" font-size="13" fill="#333" font-weight="600">Portfolio Nhà báo</text>

  <!-- Nút undo/redo -->
  <text x="200" y="63" font-size="18" fill="#666">↩</text>
  <text x="225" y="63" font-size="18" fill="#aaa">↪</text>

  <!-- Nút Xem trước -->
  <rect x="560" y="47" width="80" height="26" fill="white" stroke="#dadce0" rx="4"/>
  <text x="600" y="64" font-size="12" fill="#444" text-anchor="middle">Xem trước</text>

  <!-- Nút Xuất bản -->
  <rect x="650" y="47" width="80" height="26" fill="#1a73e8" rx="4"/>
  <text x="690" y="64" font-size="12" fill="white" text-anchor="middle">Xuất bản</text>

  <!-- Nút Chia sẻ -->
  <rect x="740" y="47" width="48" height="26" fill="white" stroke="#dadce0" rx="4"/>
  <text x="764" y="64" font-size="12" fill="#444" text-anchor="middle">⋮</text>

  <!-- Nhãn số ① -->
  <circle cx="400" cy="59" r="12" fill="#ea4335"/>
  <text x="400" y="64" font-size="12" fill="white" text-anchor="middle" font-weight="bold">①</text>
  <text x="400" y="44" font-size="10" fill="#ea4335" text-anchor="middle" font-weight="600">THANH CÔNG CỤ</text>

  <!-- ② CANVAS (khu vực xem trước) -->
  <rect x="0" y="84" width="560" height="380" fill="#e8eaed"/>

  <!-- Giả lập nội dung trang -->
  <rect x="20" y="104" width="520" height="120" fill="#4285F4" rx="6"/>
  <text x="280" y="154" font-size="18" fill="white" text-anchor="middle" font-weight="bold">Nguyễn Văn A — Nhà báo</text>
  <text x="280" y="178" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle">Phóng viên mảng văn hóa – xã hội | Huế</text>

  <rect x="20" y="240" width="160" height="100" fill="white" rx="4"/>
  <rect x="30" y="250" width="140" height="60" fill="#e0e7ff" rx="3"/>
  <rect x="30" y="318" width="100" height="8" fill="#ccc" rx="2"/>
  <rect x="30" y="332" width="70" height="6" fill="#ddd" rx="2"/>

  <rect x="200" y="240" width="160" height="100" fill="white" rx="4"/>
  <rect x="210" y="250" width="140" height="60" fill="#fce4ec" rx="3"/>
  <rect x="210" y="318" width="100" height="8" fill="#ccc" rx="2"/>
  <rect x="210" y="332" width="70" height="6" fill="#ddd" rx="2"/>

  <rect x="380" y="240" width="160" height="100" fill="white" rx="4"/>
  <rect x="390" y="250" width="140" height="60" fill="#e8f5e9" rx="3"/>
  <rect x="390" y="318" width="100" height="8" fill="#ccc" rx="2"/>
  <rect x="390" y="332" width="70" height="6" fill="#ddd" rx="2"/>

  <rect x="20" y="358" width="520" height="80" fill="white" rx="4"/>
  <rect x="30" y="370" width="200" height="8" fill="#eee" rx="2"/>
  <rect x="30" y="385" width="300" height="6" fill="#f0f0f0" rx="2"/>
  <rect x="30" y="397" width="260" height="6" fill="#f0f0f0" rx="2"/>
  <rect x="30" y="409" width="220" height="6" fill="#f0f0f0" rx="2"/>

  <!-- Nhãn số ② -->
  <circle cx="280" cy="106" r="14" fill="#ea4335"/>
  <text x="280" y="111" font-size="13" fill="white" text-anchor="middle" font-weight="bold">②</text>

  <rect x="120" y="88" width="140" height="16" fill="#ea433520" rx="3"/>
  <text x="190" y="100" font-size="10" fill="#ea4335" text-anchor="middle" font-weight="600">KHU VỰC XEM TRƯỚC (CANVAS)</text>

  <!-- ③ PANEL BÊN PHẢI -->
  <rect x="561" y="84" width="239" height="380" fill="white"/>
  <rect x="561" y="84" width="1" height="380" fill="#e0e0e0"/>

  <!-- Tab trong panel -->
  <rect x="561" y="84" width="80" height="36" fill="#e8f0fe"/>
  <text x="601" y="107" font-size="11" fill="#1a73e8" text-anchor="middle" font-weight="600">Chèn</text>
  <rect x="641" y="84" width="80" height="36" fill="white"/>
  <text x="681" y="107" font-size="11" fill="#666" text-anchor="middle">Trang</text>
  <rect x="721" y="84" width="79" height="36" fill="white"/>
  <text x="761" y="107" font-size="11" fill="#666" text-anchor="middle">Giao diện</text>
  <rect x="561" y="119" width="239" height="1" fill="#e0e0e0"/>

  <!-- Nội dung panel Chèn -->
  <text x="580" y="142" font-size="10" fill="#999" font-weight="600">NỘI DUNG</text>
  <rect x="572" y="150" width="210" height="28" fill="#f8f9fa" rx="4"/>
  <text x="590" y="169" font-size="12" fill="#333">📝  Hộp văn bản</text>
  <rect x="572" y="184" width="210" height="28" fill="#f8f9fa" rx="4"/>
  <text x="590" y="203" font-size="12" fill="#333">🖼  Hình ảnh</text>
  <rect x="572" y="218" width="210" height="28" fill="#f8f9fa" rx="4"/>
  <text x="590" y="237" font-size="12" fill="#333">▶  YouTube</text>
  <rect x="572" y="252" width="210" height="28" fill="#f8f9fa" rx="4"/>
  <text x="590" y="271" font-size="12" fill="#333">📊  Google Drive</text>
  <rect x="572" y="286" width="210" height="28" fill="#f8f9fa" rx="4"/>
  <text x="590" y="305" font-size="12" fill="#333">🗺  Google Maps</text>
  <rect x="572" y="320" width="210" height="28" fill="#f8f9fa" rx="4"/>
  <text x="590" y="339" font-size="12" fill="#333">📋  Biểu mẫu</text>
  <rect x="572" y="354" width="210" height="28" fill="#f8f9fa" rx="4"/>
  <text x="590" y="373" font-size="12" fill="#333">⊞  Nhúng</text>

  <!-- Nhãn số ③ -->
  <circle cx="680" cy="97" r="12" fill="#ea4335"/>
  <text x="680" y="102" font-size="12" fill="white" text-anchor="middle" font-weight="bold">③</text>
  <text x="750" y="79" font-size="10" fill="#ea4335" text-anchor="middle" font-weight="600">PANEL CÔNG CỤ</text>

  <!-- ④ THANH TRANG (dưới canvas) -->
  <rect x="0" y="464" width="560" height="56" fill="white"/>
  <rect x="0" y="464" width="560" height="1" fill="#e0e0e0"/>

  <rect x="12" y="472" width="80" height="28" fill="#e8f0fe" rx="14"/>
  <text x="52" y="490" font-size="11" fill="#1a73e8" text-anchor="middle">Trang chủ</text>
  <rect x="100" y="472" width="66" height="28" fill="white" rx="14" stroke="#e0e0e0"/>
  <text x="133" y="490" font-size="11" fill="#444" text-anchor="middle">Về tôi</text>
  <rect x="174" y="472" width="72" height="28" fill="white" rx="14" stroke="#e0e0e0"/>
  <text x="210" y="490" font-size="11" fill="#444" text-anchor="middle">Tác phẩm</text>
  <rect x="254" y="472" width="66" height="28" fill="white" rx="14" stroke="#e0e0e0"/>
  <text x="287" y="490" font-size="11" fill="#444" text-anchor="middle">Liên hệ</text>
  <circle cx="338" cy="486" r="12" fill="#1a73e8"/>
  <text x="338" y="491" font-size="16" fill="white" text-anchor="middle">+</text>

  <!-- Nhãn số ④ -->
  <circle cx="460" cy="486" r="12" fill="#ea4335"/>
  <text x="460" y="491" font-size="12" fill="white" text-anchor="middle" font-weight="bold">④</text>
  <text x="460" y="468" font-size="10" fill="#ea4335" text-anchor="middle" font-weight="600">THANH QUẢN LÝ TRANG</text>

  <!-- Chú thích legend dưới -->
  <rect x="561" y="464" width="239" height="56" fill="#f8f9fa"/>
  <text x="680" y="483" font-size="10" fill="#666" text-anchor="middle">① Thanh công cụ — Xuất bản, Chia sẻ</text>
  <text x="680" y="497" font-size="10" fill="#666" text-anchor="middle">② Canvas — Chỉnh sửa trực tiếp</text>
  <text x="680" y="511" font-size="10" fill="#666" text-anchor="middle">③ Panel — Chèn, Trang, Giao diện   ④ Quản lý trang</text>

</svg>
