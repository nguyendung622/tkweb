<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="'Be Vietnam Pro', Arial, sans-serif">

  <!-- ① NỀN — vẽ trước -->
  <rect width="720" height="380" fill="#fafbfc" rx="6"/>

  <!-- Thanh bên trái: Độ khó SEO -->
  <rect x="10" y="48" width="70" height="80" fill="#ffcdd2" rx="3"/>
  <rect x="10" y="132" width="70" height="80" fill="#ffe0b2" rx="3"/>
  <rect x="10" y="216" width="70" height="80" fill="#c8e6c9" rx="3"/>

  <!-- Thanh bên phải: Ý định tìm kiếm -->
  <rect x="640" y="48" width="70" height="80" fill="#e3f2fd" rx="3"/>
  <rect x="640" y="132" width="70" height="80" fill="#fff9c4" rx="3"/>
  <rect x="640" y="216" width="70" height="80" fill="#c8e6c9" rx="3"/>

  <!-- Ghi chú cuối -->
  <rect x="10" y="336" width="700" height="36" fill="#e8f5e9" rx="5" stroke="#a5d6a7" stroke-width="1"/>

  <!-- ② NỘI DUNG PHỄU + TEXT — vẽ giữa -->
  <text x="360" y="24" font-size="13" fill="#333" text-anchor="middle" font-weight="700">Từ khóa ngắn vs. Từ khóa dài (Long-tail) trong báo chí</text>

  <!-- Tầng 1: Short-tail -->
  <polygon points="100,48 620,48 560,128 160,128" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="360" y="82" font-size="13" fill="#0d47a1" text-anchor="middle" font-weight="700">Từ khóa ngắn (Short-tail)</text>
  <text x="360" y="100" font-size="11" fill="#1565c0" text-anchor="middle">"bão" · "lạm phát" · "vaccine" · "ô nhiễm"</text>
  <text x="360" y="116" font-size="10" fill="#1565c0" text-anchor="middle">Lượng tìm kiếm: 100.000 – 10.000.000+/tháng</text>

  <!-- Tầng 2: Medium -->
  <polygon points="160,132 560,132 510,212 210,212" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="360" y="163" font-size="12" fill="#e65100" text-anchor="middle" font-weight="700">Từ khóa trung bình</text>
  <text x="360" y="180" font-size="11" fill="#bf360c" text-anchor="middle">"ô nhiễm không khí Hà Nội" · "lạm phát 2024"</text>
  <text x="360" y="196" font-size="10" fill="#bf360c" text-anchor="middle">Lượng tìm kiếm: 5.000 – 100.000/tháng</text>

  <!-- Tầng 3: Long-tail -->
  <polygon points="210,216 510,216 470,296 250,296" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5"/>
  <text x="360" y="244" font-size="12" fill="#1b5e20" text-anchor="middle" font-weight="700">Từ khóa dài (Long-tail)</text>
  <text x="360" y="261" font-size="10" fill="#2e7d32" text-anchor="middle">"tác dụng phụ vaccine cúm mùa 2024 trẻ em"</text>
  <text x="360" y="276" font-size="10" fill="#2e7d32" text-anchor="middle">"lạm phát ảnh hưởng giá xăng tháng 3/2024"</text>
  <text x="360" y="292" font-size="10" fill="#2e7d32" text-anchor="middle">Lượng tìm kiếm: 100 – 5.000/tháng</text>

  <!-- Nhãn thanh trái -->
  <text x="45" y="84" font-size="9" fill="#c62828" text-anchor="middle" font-weight="700">RẤT</text>
  <text x="45" y="96" font-size="9" fill="#c62828" text-anchor="middle" font-weight="700">CAO</text>
  <text x="45" y="168" font-size="9" fill="#e65100" text-anchor="middle" font-weight="700">TRUNG</text>
  <text x="45" y="180" font-size="9" fill="#e65100" text-anchor="middle" font-weight="700">BÌNH</text>
  <text x="45" y="252" font-size="9" fill="#2e7d32" text-anchor="middle" font-weight="700">THẤP</text>

  <!-- Tiêu đề cột trái -->
  <text x="45" y="310" font-size="9" fill="#555" text-anchor="middle" font-weight="600">Độ khó SEO</text>
  <text x="45" y="322" font-size="8" fill="#888" text-anchor="middle">(Cạnh tranh)</text>

  <!-- Mũi tên trái: giảm dần -->
  <line x1="85" y1="60" x2="85" y2="295" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="85,295 81,278 89,278" fill="#c62828"/>
  <text x="93" y="60" font-size="8" fill="#c62828">cao</text>
  <text x="93" y="298" font-size="8" fill="#c62828">thấp</text>

  <!-- Nhãn thanh phải -->
  <text x="675" y="84" font-size="9" fill="#5c85bd" text-anchor="middle" font-weight="700">MƠ</text>
  <text x="675" y="96" font-size="9" fill="#5c85bd" text-anchor="middle" font-weight="700">HỒ</text>
  <text x="675" y="168" font-size="9" fill="#f57f17" text-anchor="middle" font-weight="700">RÕ</text>
  <text x="675" y="180" font-size="9" fill="#f57f17" text-anchor="middle" font-weight="700">HƠN</text>
  <text x="675" y="252" font-size="9" fill="#2e7d32" text-anchor="middle" font-weight="700">RẤT</text>
  <text x="675" y="264" font-size="9" fill="#2e7d32" text-anchor="middle" font-weight="700">RÕ</text>

  <!-- Tiêu đề cột phải -->
  <text x="675" y="310" font-size="9" fill="#555" text-anchor="middle" font-weight="600">Ý định tìm</text>
  <text x="675" y="322" font-size="8" fill="#888" text-anchor="middle">kiếm</text>

  <!-- Mũi tên phải: tăng dần -->
  <line x1="635" y1="295" x2="635" y2="60" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="635,60 631,77 639,77" fill="#2e7d32"/>
  <text x="623" y="60" font-size="8" fill="#2e7d32" text-anchor="end">cao</text>
  <text x="623" y="298" font-size="8" fill="#2e7d32" text-anchor="end">thấp</text>

  <!-- Ghi chú cuối -->
  <text x="360" y="352" font-size="11" fill="#1b5e20" text-anchor="middle" font-weight="600">💡 Chiến lược cho báo chí:</text>
  <text x="360" y="366" font-size="10" fill="#2e7d32" text-anchor="middle">Dùng từ khóa dài cho bài điều tra chuyên sâu · Từ khóa trung bình cho tin tổng hợp · Tránh cạnh tranh từ khóa ngắn</text>

</svg>
